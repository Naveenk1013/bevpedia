# ============================================
# NETLIFY CONFIGURATION FOR BEVPEDIA.IN
# ============================================

# REDIRECT RULES (order matters - first match wins)

# 1. REMOVE TRAILING SLASHES
# Redirects: /cocktails/mojito/ → /cocktails/mojito
[[redirects]]
  from = "/:path(.*/)$"
  to = "/:path"
  status = 301
  force = true

# 2. SPA ROUTING
# API routes first
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# All other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================
# CACHE HEADERS (Performance optimization)
# ============================================

# Default caching for all files (1 hour)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"

# No caching for HTML (always fetch latest)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"

# Long-term caching for static files
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-term caching for images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# XML and text files
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"

[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain"
